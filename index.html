<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livestock CRM</title>
    <!-- Use similar fonts to the design -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bg-circles">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <!-- Phone Simulator Container to enforce the design language -->
    <div class="app-container">
        <header class="app-header">
            <!-- Emulate iOS status bar space -->
            <div class="status-bar">
                <span class="time">9:30</span>
                <div class="icons">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-full"></i>
                </div>
            </div>
            <div class="header-content">
                <h1 id="header-greeting" data-i18n="hello">Hello<br>Livestock!</h1>
                <p data-i18n="manage_animals">Manage your animals</p>
                <i class="fas fa-language menu-icon btn-lang" title="Toggle Language" style="cursor: pointer; right: 70px;"></i>
                <i class="fas fa-sign-out-alt menu-icon" id="btn-logout" title="Log Out" style="cursor: pointer; display: none;"></i>
            </div>
        </header>

        <main class="app-content">
            <div class="content-header">
                <h2 data-i18n="your_herd">Your Herd</h2>
            </div>
            <div class="table-container">
                <table id="animal-table">
                    <thead>
                        <tr>
                            <th data-i18n="id_code">ID Code</th>
                            <th data-i18n="name">Name</th>
                            <th data-i18n="created_by">Created By</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="animal-list">
                        <!-- Populated dynamically -->
                    </tbody>
                </table>
                <div id="empty-state" class="empty-state hidden">
                    <p data-i18n="empty_herd">Your herd is empty. Add your first animal.</p>
                </div>
            </div>

            <button class="fab" id="btn-add" title="Add Animal">
                <i class="fas fa-plus"></i>
            </button>
        </main>
    </div>

    <!-- Auth Modal -->
    <div class="modal-overlay" id="auth-modal" style="background: var(--surface-color); opacity: 1; z-index: 200; border-radius: inherit;">
        <i class="fas fa-language btn-lang" title="Toggle Language" style="position: absolute; top: 30px; right: 30px; font-size: 28px; color: var(--primary-color); cursor: pointer; z-index: 210;"></i>
        <div class="modal-content" style="transform: translateY(0); display: flex; flex-direction: column; justify-content: center; height: 100%; border-radius: inherit; max-height: none;">
            <div style="text-align: center; margin-bottom: 40px;">
                <h1 style="color: var(--primary-color); font-size: 32px; font-weight: 800; line-height: 1.1;">Livestock CRM</h1>
                <p data-i18n="sign_in_prompt" style="color: var(--text-muted); margin-top: 10px; font-size: 16px;">Sign in to manage your herd</p>
            </div>
            <form id="auth-form">
                <div class="input-group" id="name-group" style="display: none;">
                    <label data-i18n="full_name_label">Full Name</label>
                    <input type="text" id="auth-name" placeholder="e.g. John Smith" data-i18n-placeholder="eg_fullname">
                </div>
                <div class="input-group">
                    <label data-i18n="email_label">Email</label>
                    <input type="email" id="auth-email" required placeholder="you@example.com">
                </div>
                <div class="input-group">
                    <label data-i18n="password_label">Password</label>
                    <input type="password" id="auth-password" required placeholder="••••••••">
                </div>
                <div id="auth-error" style="color: red; font-size: 14px; margin-bottom: 10px; display: none; text-align: center;"></div>
                <button type="submit" class="btn-primary" id="btn-login" data-i18n="sign_in_btn">SIGN IN</button>
                <button type="button" class="btn-primary" id="btn-signup" data-i18n="sign_up_btn" style="background: transparent; color: var(--primary-color); border: 2px solid var(--primary-color); margin-top: 5px; box-shadow: none;">SIGN UP</button>
                
                <div style="text-align: center; margin-top: 30px;">
                    <a href="admin-login.html" id="admin-login-link" style="color: var(--primary-color); text-decoration: none; font-weight: 600; font-size: 15px;"><i class="fas fa-user-shield"></i> Admin Login</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Add/Edit Animal Modal -->
    <div class="modal-overlay hidden" id="add-modal">
        <div class="modal-content">
            <button class="close-btn" id="close-add-modal"><i class="fas fa-times"></i></button>
            <h2 class="modal-title" data-i18n="register_animal">Register Animal</h2>
            <form id="add-form">
                <div class="input-group">
                    <label data-i18n="id_code">ID Code</label>
                    <input type="text" id="input-id" required placeholder="e.g. COW-001" data-i18n-placeholder="eg_id">
                    <i class="fas fa-check input-icon hidden" id="icon-id"></i>
                </div>
                <div class="input-group">
                    <label data-i18n="name">Name</label>
                    <input type="text" id="input-name" required placeholder="e.g. Daisy" data-i18n-placeholder="eg_name">
                    <i class="fas fa-check input-icon hidden" id="icon-name"></i>
                </div>
                <div class="input-group">
                    <label data-i18n="race_breed">Race / Breed</label>
                    <input type="text" id="input-race" required placeholder="e.g. Angus" data-i18n-placeholder="eg_race">
                </div>
                <div class="input-group">
                    <label data-i18n="gender">Gender</label>
                    <select id="input-gender" required>
                        <option value="" disabled selected data-i18n="select_gender">Select gender</option>
                        <option value="cow" data-i18n="cow_female">Cow (Female)</option>
                        <option value="bull" data-i18n="bull_male">Bull (Male)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label data-i18n="description">Description</label>
                    <textarea id="input-desc" rows="2" placeholder="Notes about this animal..." data-i18n-placeholder="notes_placeholder"></textarea>
                </div>
                <div class="input-group half">
                    <label data-i18n="mother_id">Mother (ID/Name)</label>
                    <input type="text" id="input-mother" placeholder="e.g. Bessie" data-i18n-placeholder="eg_mother">
                </div>
                <div class="input-group half">
                    <label data-i18n="father_id">Father (ID/Name)</label>
                    <input type="text" id="input-father" placeholder="e.g. Ferdinand" data-i18n-placeholder="eg_father">
                </div>
                
                <button type="submit" class="btn-primary" data-i18n="save_animal">SAVE ANIMAL</button>
            </form>
        </div>
    </div>

    <!-- Animal Profile Modal -->
    <div class="modal-overlay hidden" id="profile-modal">
        <div class="modal-content profile-card">
            <button class="close-btn" id="close-profile-modal"><i class="fas fa-times"></i></button>
            <div class="profile-header">
                <div class="profile-avatar">
                    <i class="fas fa-cow fa-2x"></i>
                </div>
                <h2 id="view-name">Name</h2>
                <div class="tags-container">
                    <span class="tag" id="view-id">ID: 000</span>
                    <span class="tag" id="view-gender">Gender</span>
                </div>
            </div>
            
            <div class="profile-body">
                <div class="info-row">
                    <div class="info-block">
                        <label data-i18n="race_breed">Race / Breed</label>
                        <p id="view-race">-</p>
                    </div>
                </div>
                <div class="info-row full">
                    <div class="info-block">
                        <label data-i18n="description">Description</label>
                        <p id="view-desc">-</p>
                    </div>
                </div>
                
                <h3 class="genealogy-title" data-i18n="genealogy_tree">Genealogy Tree</h3>
                <div class="genealogy-tree">
                    <div class="parent">
                        <div class="parent-icon pink"><i class="fas fa-venus"></i></div>
                        <span class="parent-label" data-i18n="mother">Mother</span>
                        <p id="view-mother">-</p>
                    </div>
                    <div class="tree-line"></div>
                    <div class="parent">
                        <div class="parent-icon blue"><i class="fas fa-mars"></i></div>
                        <span class="parent-label" data-i18n="father">Father</span>
                        <p id="view-father">-</p>
                    </div>
                </div>
            </div>
            
            <div class="profile-actions">
                <button class="btn-primary" id="btn-download">
                    <i class="fas fa-download"></i> <span data-i18n="download_record">DOWNLOAD RECORD</span>
                </button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
